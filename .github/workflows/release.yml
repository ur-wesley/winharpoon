name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Determine version
        id: version
        shell: bash
        run: |
          cargo_version=$(grep -E '^version\s*=' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ "${{ github.event_name }}" = "push" ]; then
            version="${GITHUB_REF#refs/tags/v}"
            if [ "$version" != "$cargo_version" ]; then
              echo "Tag version ($version) does not match Cargo.toml ($cargo_version)"
              exit 1
            fi
          else
            version="$cargo_version"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: ./scripts/build-installer.ps1 -Version ${{ steps.version.outputs.value }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinHarpoon-Setup-${{ steps.version.outputs.value }}
          path: dist/WinHarpoon-Setup-*.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/WinHarpoon-Setup-*.exe
          generate_release_notes: true
