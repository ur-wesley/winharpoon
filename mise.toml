[tools]
rust = "1.96.0"

[tasks.build]
description = "Build debug binary"
run = "cargo build"

[tasks."build:release"]
description = "Build release binary"
run = "cargo build --release"

[tasks.check]
description = "Type-check without producing a binary"
run = "cargo check"

[tasks.dev]
run = "cargo watch -x run"
